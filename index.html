<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Visual Turing Test – Mammograms</title>
    <style>
        :root {
            --img-width: 400px;
            --img-height-auto: auto;
            --scale-gap: 6px;
            --tick-width: 48px;
        }
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; color:#222; }
        .image-container { display: flex; justify-content: center; gap: 40px; margin: 30px 0; flex-wrap:wrap; }
        .image-card { text-align: center; width: 460px; position: relative; }
        .panzoom { width: var(--img-width); height: auto; margin: 0 auto; overflow: hidden; border-radius:8px; border:2px solid #ccc; display:inline-block; background:#f8f8f8; touch-action: none; }
        .panzoom img { display:block; width:100%; height:auto; transform-origin: center center; cursor: grab; user-select:none; -webkit-user-drag:none; transition: transform 0.08s linear; }
        .controls-inline { display:flex; align-items:center; gap:8px; justify-content:center; margin-top:8px; }
        .zoom-btn { padding:6px 10px; font-size:14px; cursor:pointer; }
        .zoom-label { font-size:14px; margin-right:6px; }
        .slider-row { margin-top: 12px; display:flex; align-items:center; justify-content:center; gap:10px; }
        input[type="range"] { width: 220px; }
        .value-span { min-width:20px; display:inline-block; text-align:center; font-weight:600; }
        .scale-container { margin-top:10px; display:flex; justify-content:center; gap:var(--scale-gap); align-items:flex-start; }
        .tick { width: var(--tick-width); text-align:center; font-size:13px; color:#333; }
        .tick .num { font-weight:700; font-size:14px; display:block; margin-bottom:4px; }
        .tick .desc { font-size:12px; color:#444; line-height:1.1; }
        .tick.active { background: linear-gradient(90deg, rgba(0,120,215,0.08), rgba(0,120,215,0.02)); border-radius:6px; padding:6px; }
        button { margin: 10px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
        .trial-info { font-size: 18px; margin: 20px; }
        #result-area { margin-top: 30px; font-weight: bold; }
        /* Modal */
        .modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; overflow:auto; background: rgba(0,0,0,0.85); align-items:center; justify-content:center; }
        .modal-content { position:relative; max-width:95%; max-height:95%; }
        .modal-content img { width:auto; max-width:100%; max-height:90vh; transform-origin:center center; transition: transform 0.08s linear; cursor: grab; }
        .modal-zoom-controls { position:absolute; right:10px; top:10px; display:flex; gap:8px; }
        @media (max-width:1000px) {
            .image-container { gap:20px; }
            .image-card { width:100%; max-width:480px; }
            .tick { width: calc((100% - (6 * var(--scale-gap))) / 7); }
        }
    </style>
</head>
<body>
    <h1>Visual Turing Test: Real vs Synthetic Mammograms</h1>
    <p>For each image, set a confidence from <strong>0</strong> (confident fake) to <strong>6</strong> (confident real).</p>
    <div class="trial-info">Trial <span id="trial-num">1</span> / <span id="total-trials">20</span></div>

    <div class="image-container">
        <div class="image-card">
            <div class="panzoom" id="left-wrap">
                <img id="left-img" class="test-img" src="" alt="Left image" data-side="left" draggable="false">
            </div>

            <div class="controls-inline">
                <span class="zoom-label">Zoom</span>
                <button class="zoom-btn zoom-minus" data-side="left">−</button>
                <button class="zoom-btn zoom-plus" data-side="left">+</button>
                <button class="zoom-btn zoom-reset" data-side="left">Reset</button>
            </div>

            <div class="slider-row">
                <label for="left-slider">Left</label>
                <input id="left-slider" type="range" min="0" max="6" step="1" value="3">
                <span id="left-value" class="value-span">3</span>
            </div>

            <div class="scale-container" id="left-scale"></div>
        </div>

        <div class="image-card">
            <div class="panzoom" id="right-wrap">
                <img id="right-img" class="test-img" src="" alt="Right image" data-side="right" draggable="false">
            </div>

            <div class="controls-inline">
                <span class="zoom-label">Zoom</span>
                <button class="zoom-btn zoom-minus" data-side="right">−</button>
                <button class="zoom-btn zoom-plus" data-side="right">+</button>
                <button class="zoom-btn zoom-reset" data-side="right">Reset</button>
            </div>

            <div class="slider-row">
                <label for="right-slider">Right</label>
                <input id="right-slider" type="range" min="0" max="6" step="1" value="3">
                <span id="right-value" class="value-span">3</span>
            </div>

            <div class="scale-container" id="right-scale"></div>
        </div>
    </div>

    <div>
        <button id="next-btn">Next trial</button>
    </div>

    <div id="result-area"></div>

    <!-- Zoom modal -->
    <div id="zoom-modal" class="modal">
        <div class="modal-content">
            <div class="modal-zoom-controls">
                <button id="modal-zoom-in" class="zoom-btn">+</button>
                <button id="modal-zoom-out" class="zoom-btn">−</button>
                <button id="modal-close" class="zoom-btn">✕</button>
            </div>
            <img id="zoom-img" src="" alt="Zoomed image" draggable="false">
        </div>
    </div>

    <script src="turing-test.js"></script>
</body>
</html>
